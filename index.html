<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewarded App Manual</title>
    
    <!-- SDK do Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- SDK da Monetag SEM o data-auto -->
    <script 
        src='//libtl.com/sdk.js' 
        data-zone='11002325' 
        data-sdk='show_11002325'>
    </script>

    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #121212);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #0088cc;
            width: 80%;
        }
        #points {
            font-size: 48px;
            color: #0088cc;
            font-weight: bold;
        }
        .btn-claim {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <span id="points">0</span>
        <p>PONTOS</p>
        <button class="btn-claim" id="adBtn">GANHAR PONTOS</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let userPoints = 0;

        document.getElementById('adBtn').onclick = () => {
            tg.HapticFeedback.impactOccurred('medium');

            // Verifica se a função da Monetag já carregou
            if (typeof show_11002325 === 'function') {
                
                // Chama o anúncio manualmente usando o seu código Rewarded
                show_11002325('pop').then(() => {
                    // Executa quando o anúncio termina
                    userPoints += 10;
                    document.getElementById('points').innerText = userPoints;
                    tg.HapticFeedback.notificationOccurred('success');
                    alert("Parabéns! Você ganhou 10 pontos.");
                }).catch(e => {
                    // Executa se houver erro ou o usuário fechar antes
                    console.error("Erro no anúncio:", e);
                    alert("O anúncio não pôde ser carregado agora. Tente em instantes.");
                });

            } else {
                alert("O sistema de anúncios ainda está carregando. Aguarde 3 segundos.");
            }
        };
    </script>
</body>
</html>
