<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App Monetizado</title>
    
    <!-- SDK do Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- SDK Monetag: 3 anúncios / 0.033 (2 min) / 20s intervalo / 7s timeout / 0 -->
    <script 
        src='//libtl.com/sdk.js' 
        data-zone='11002325' 
        data-sdk='show_11002325' 
        data-auto="3/0.033/20/7/0">
    </script>

    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #f0f2f5);
            color: var(--tg-theme-text-color, #333);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 80%;
        }
        .btn {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>💰 Saldo Atualizado</h2>
        <p>Aguarde alguns segundos para o sistema processar seus anúncios.</p>
        <button class="btn" onclick="tg.HapticFeedback.impactOccurred('light')">ATUALIZAR</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
