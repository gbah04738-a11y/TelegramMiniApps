<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganhe Prêmios Diários</title>
    
    <!-- SDK do Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- SDK da Monetag com Configuração para 5 anúncios por minuto -->
    <!-- Formato: 5 anúncios / 0.016 (1 min) / 10s intervalo / 3s timeout / 0 -->
    <script 
        src='//libtl.com/sdk.js' 
        data-zone='11002325' 
        data-sdk='show_11002325' 
        data-auto="5/0.016/10/3/0">
    </script>

    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f9);
            color: var(--tg-theme-text-color, #222);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💰 Multiplicador de Lucro</h1>
        <p>Os anúncios carregarão automaticamente a cada 10 segundos.</p>
        <button class="btn" id="mainBtn">VERIFICAR PONTOS</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('mainBtn').onclick = () => {
            tg.HapticFeedback.impactOccurred('light');
            // Como o data-auto está ativo, não precisamos chamar a função aqui.
            // O próprio script da Monetag gerencia a exibição conforme a frequência acima.
        };
    </script>
</body>
</html>
