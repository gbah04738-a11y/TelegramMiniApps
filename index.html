<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganhe Prêmios</title>
    
    <!-- SDK do Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- SDK da Monetag com Configuração Automática (data-auto) -->
    <!-- Formato: frequency / capping / interval / timeout / everyPage -->
    <script 
        src='//libtl.com/sdk.js' 
        data-zone='11002325' 
        data-sdk='show_11002325' 
        data-auto="2/0.1/30/5/0">
    </script>

    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div style="text-align: center; padding: 20px;">
        <h1>🎁 Bem-vindo!</h1>
        <p>Aguarde 5 segundos para o anúncio carregar automaticamente.</p>
        <button class="btn" id="checkBtn">Verificar Saldo</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Agora não precisamos chamar a função show_... aqui dentro!
        // O data-auto vai tentar abrir o anúncio sozinho 5 segundos após abrir o app.
        
        document.getElementById('checkBtn').onclick = () => {
            tg.HapticFeedback.impactOccurred('medium');
            alert("Se o anúncio não apareceu ainda, aguarde os 5 segundos do timer automático.");
        };
    </script>
</body>
</html>
